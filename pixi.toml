[workspace]
name = "aulas-implementacao-mef"
description = "Aulas de implementação com Elementos Finitos na disciplina GA-020 do LNCC"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "win-64"]

[dependencies]
python = ">=3.12,<3.14"

[feature.formatters.dependencies]
ruff = "*"
pre-commit = "*"

[feature.notebooks.dependencies]
ipython = "*"
jupyterlab = "*"
jupytext = "*"

[feature.sci.dependencies]
pandas = "*"
numpy = "*"
scipy = "*"

[feature.viz.dependencies]
matplotlib = "*"
seaborn = "*"

##############################################
# Dependências específicas de Elementos Finitos
##############################################
[feature.fenics.dependencies]
fenics-dolfinx = "*"

[target.unix.activation.env]
PROJECT_ROOT = "$PIXI_PROJECT_ROOT"
NOTEBOOKS_PATH = "$PIXI_PROJECT_ROOT/notebooks"

[tasks]
precommit = "pre-commit run --all-files"
notebooks-smoke = "python -c 'from pathlib import Path; n=sorted(Path(\"notebooks\").rglob(\"*.ipynb\")); print(len(n), [str(p.relative_to(Path(\"notebooks\"))) for p in n])'"
notebooks-sync = "python scripts/sync_notebooks.py"
precommit-sync = "python scripts/sync_notebooks.py && pre-commit run --all-files"

[environments]
default = { features = ["formatters", "viz", "sci", "notebooks"], solve-group = "default" }
fenics-env = { features = ["formatters", "viz", "sci", "notebooks", "fenics"], solve-group = "default" }
